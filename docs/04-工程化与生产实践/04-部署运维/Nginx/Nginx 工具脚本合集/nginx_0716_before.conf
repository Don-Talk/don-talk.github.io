	server {
		    listen 8082;  # 监听 8082 端口
		    server_name 120.24.172.162;  # 服务器名称（可以是域名或 IP）

		    # 设置根目录
		    root /www/watch_show/h5;  # 静态网页文件所在的目录

		    location = /notice {
			    # 返回 notice.html 文件
		    	    try_files /notice.html =404;
		    }

		    # 处理带参数的请求
		    location / {
			return 301 /notice;
		    }

		    # 错误页面配置
		    error_page 404 /404.html;
		    location = /404.html {
		        internal;
		    }

		    error_page 500 502 503 504 /50x.html;
		    location = /50x.html {
		        internal;
		    }

		    # 日志配置
		    access_log /var/log/nginx/8082_access.log;
		    error_log /var/log/nginx/8082_error.log;
	}



	##
	# Basic Settings
	##

	sendfile on;
	tcp_nopush on;
	tcp_nodelay on;
	keepalive_timeout 65;
	types_hash_max_size 2048;
	# server_tokens off;

	# server_names_hash_bucket_size 64;
	# server_name_in_redirect off;

	include /etc/nginx/mime.types;
	default_type application/octet-stream;

	##
	# SSL Settings
	##

	ssl_protocols TLSv1 TLSv1.1 TLSv1.2 TLSv1.3; # Dropping SSLv3, ref: POODLE
	ssl_prefer_server_ciphers on;

	##
	# Logging Settings
	##

	access_log /var/log/nginx/access.log;
	error_log /var/log/nginx/error.log;

	##
	# Gzip Settings
	##

	gzip on;

	# gzip_vary on;
	# gzip_proxied any;
	# gzip_comp_level 6;
	# gzip_buffers 16 8k;
	# gzip_http_version 1.1;
	# gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

	##
	# Virtual Host Configs
	##

	include /etc/nginx/conf.d/*.conf;
	include /etc/nginx/sites-enabled/*;
}



