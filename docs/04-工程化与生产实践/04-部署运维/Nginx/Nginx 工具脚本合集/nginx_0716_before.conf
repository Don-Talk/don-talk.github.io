user www-data;
worker_processes auto;
pid /run/nginx.pid;
include /etc/nginx/modules-enabled/*.conf;

events {
	worker_connections 768;
	# multi_accept on;
}




http {
	 log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                       '$status $body_bytes_sent "$http_referer" '
                       '"$http_user_agent" "$http_x_forwarded_for"';


	server {
                         listen       80;
                        server_name  openwearplay.com www.openwearplay.com;
                        charset utf-8;
		
			#将所有HTTP请求通过rewrite指令重定向到HTTPS。
			rewrite ^(.*)$ https://$host$1;

                        location / {
                                root   /www/watch/portal/dist;
                                index  index.html index.htm;
                        }

                        error_page   500 502 503 504  /50x.html;
                        location = /50x.html {
                                root   html;
                        }
        }

	server {
		     #HTTPS的默认访问端口443。
		     #如果未在此处配置HTTPS的默认访问端口，可能会造成Nginx无法启动。
		     listen 443 ssl;
     
		     #填写证书绑定的域名
		     server_name openwearplay.com;
 
		     #填写证书文件绝对路径
		     ssl_certificate /etc/nginx/cert/openwearplay.com.pem;
		     #填写证书私钥文件绝对路径
		     ssl_certificate_key /etc/nginx/cert/openwearplay.com.key;
 
		     ssl_session_cache shared:SSL:1m;
		     ssl_session_timeout 5m;
	 
		     #自定义设置使用的TLS协议的类型以及加密套件（以下为配置示例，请您自行评估是否需要配置）
		     #TLS协议版本越高，HTTPS通信的安全性越高，但是相较于低版本TLS协议，高版本TLS协议对浏览器的兼容性较差。
		     ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE:ECDH:AES:HIGH:!NULL:!aNULL:!MD5:!ADH:!RC4;
		     ssl_protocols TLSv1.1 TLSv1.2 TLSv1.3;

		     #表示优先使用服务端加密套件。默认开启
		     ssl_prefer_server_ciphers on;


			location / {
                                root   /www/watch/portal/dist;
                                index  index.html index.htm;
                        }

                        location /api/ {
                                proxy_set_header Host $http_host;
                                proxy_set_header X-Real-IP $remote_addr;
                                proxy_set_header REMOTE-HOST $remote_addr;
                                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                                proxy_pass http://127.0.0.1:6792/;
                        }

                         # 江鸟工具演示服务器跨域
			  location /dial-tool-api/ {
                                # proxy_pass http://101.37.181.48:8088/;
				proxy_pass https://beta.ohwatchface.com/;
                                add_header Access-Control-Allow-Methods 'GET, POST, PUT, DELETE, OPTIONS';
                                if ($request_method = 'OPTIONS') {
                                    add_header Access-Control-Allow-Origin *;
                                    add_header Access-Control-Allow-Headers 'authorization';
                                    add_header Access-Control-Allow-Headers  'Content-Type';
                                    add_header Access-Control-Allow-Methods *;
                                    return 204;
                                 }
                          }

                        location /preview/api/ {
				access_log /var/log/nginx/previewApi.log;
                                proxy_set_header Host $http_host;
                                proxy_set_header X-Real-IP $remote_addr;
                                proxy_set_header REMOTE-HOST $remote_addr;
                                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                                proxy_pass http://127.0.0.1:8762/;
                        }

                         # 江鸟工具生产服务器跨域
                          location /dial-tool-api-prod/ {
                                proxy_pass https://www.ohwatchface.com/;
                                add_header Access-Control-Allow-Methods 'GET, POST, PUT, DELETE, OPTIONS';
                                if ($request_method = 'OPTIONS') {
                                    add_header Access-Control-Allow-Origin *;
                                    add_header Access-Control-Allow-Headers 'authorization';
                                    add_header Access-Control-Allow-Headers  'Content-Type';
                                    add_header Access-Control-Allow-Methods *;
                                    return 204;
                                 }
                          }


                        location /ums {
                                alias /www/watch/ums/dist;
                                try_files $uri $uri/  /ums/index.html;
                        }

                        location /watch/app {
                                alias /www/watch/h5_app/dist;
                                try_files $uri $uri/ /watch/index.html;
                        }

                        location /watch/theme {
                                alias /www/watch/h5_dial/dist;
                                try_files $uri $uri/ /watch/index.html;
                        }

                        location /preview/ums {
                                alias   /www/watch_preview/ums/dist;
				try_files $uri $uri/ /preview/ums/index.html;
                        }

                        location /preview/watch/app {
                                alias /www/watch_preview/h5_app/dist;
                                try_files $uri $uri/ /preview/watch/app/index.html;
                        }

                        location /preview/watch/theme {
                                alias /www/watch_preview/h5_dial/dist;
                                try_files $uri $uri/ /preview/watch/theme/index.html;
                        } 
 
	}





