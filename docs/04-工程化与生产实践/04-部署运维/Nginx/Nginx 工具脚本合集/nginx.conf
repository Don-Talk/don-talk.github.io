user www-data;
worker_processes auto;
pid /run/nginx.pid;
include /etc/nginx/modules-enabled/*.conf;

events {
	worker_connections 768;
	# multi_accept on;
}




http {
	 log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                       '$status $body_bytes_sent "$http_referer" '
                       '"$http_user_agent" "$http_x_forwarded_for"';
	
	server {
			 listen       80;
			server_name  www.openwearplay.com;
			charset utf-8;

			location / {
				root   /www/watch/v1/ums/dist;
				try_files $uri $uri/ /index.html;
				index  index.html index.htm;
			}

			location /api/ {
				proxy_set_header Host $http_host;
				proxy_set_header X-Real-IP $remote_addr;
				proxy_set_header REMOTE-HOST $remote_addr;
				proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
				proxy_pass http://120.24.172.162:8092/;
			}

			error_page   500 502 503 504  /50x.html;
			location = /50x.html {
				root   html;
			}
	}

	server {
        	listen               8090;
	        server_name          127.0.0.1;


	        location / {
        	    root             /www/wwwroot/dist;
	            index            index.html;
        	    try_files        $uri $uri/ /index.html;    #uniapp history模式刷新404问题
	            autoindex        on;
        	    autoindex_exact_size on;
	            autoindex_localtime  on;
       		 }
	}


	server {
			listen               8081;
			server_name          120.24.172.162;

	add_header Access-Control-Allow-Origin *;
	add_header Access-Control-Allow-Headers "Origin, X-Requested-With, Content-Type, Accept";
	add_header Access-Control-Allow-Methods "POST, GET, OPTIONS, DELETE ";
	add_header Access-Control-Allow-Credentials "true";


			location / {
	
				root             /www/watch/ums/dist;
				index            index.html;
				try_files        $uri $uri/ /index.html;    #uniapp history模式刷新404问题
				autoindex        on;
				autoindex_exact_size on;
				autoindex_localtime  on;


			 }
	}


	server {
			listen               8082;
			server_name          120.24.172.162;

			add_header Access-Control-Allow-Origin *;
			add_header Access-Control-Allow-Headers "Origin, X-Requested-With, Content-Type, Accept";
			add_header Access-Control-Allow-Methods "POST, GET, OPTIONS, DELETE ";
			add_header Access-Control-Allow-Credentials "true";


			location / {

				root             /www/watch/h5/dist;
				index            index.html;
				try_files        $uri $uri/ /index.html;    #uniapp history模式刷新404问题
				autoindex        on;
				autoindex_exact_size on;
				autoindex_localtime  on;
			 }
	}

	server {
			 listen       8096;
			server_name  120.24.172.162;
			charset utf-8;

			location / {
				root   /www/watch/v1/h5/dist;
				try_files $uri $uri/ /index.html;
				index  index.html index.htm;
			}

			location /api/ {
				proxy_set_header Host $http_host;
				proxy_set_header X-Real-IP $remote_addr;
				proxy_set_header REMOTE-HOST $remote_addr;
				proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
				proxy_pass http://120.24.172.162:8092/;
			}

			error_page   500 502 503 504  /50x.html;
			location = /50x.html {
				root   html;
			}
	}
	
	server {
			 listen       8097;
			server_name  120.24.172.162;
			charset utf-8;

			location / {
				root   /www/watch/v1/ums/dist;
				try_files $uri $uri/ /index.html;
				index  index.html index.htm;
			}

			location /api/ {
				proxy_set_header Host $http_host;
				proxy_set_header X-Real-IP $remote_addr;
				proxy_set_header REMOTE-HOST $remote_addr;
				proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
				proxy_pass http://120.24.172.162:8092/;
			}

			error_page   500 502 503 504  /50x.html;
			location = /50x.html {
				root   html;
			}
	}


	server {
			listen               8083;
			server_name          localhost;
	

	location  / {  
			add_header Access-Control-Allow-Origin '*';  
		add_header Access-Control-Allow-Headers '*';  
			add_header Access-Control-Allow-Methods '*';  
			add_header Access-Control-Allow-Credentials 'true';  
			if ($request_method = 'OPTIONS') {  
				return 204;  
			}  
			proxy_pass  http://localhost:8080;   
	 }  

	}

	server {
	        listen       8085;
        	server_name  localhost;
		autoindex on;		 #自动显示目录
	   	autoindex_exact_size off; 	#人性化方式显示文件大小否则以byte显示
	   	autoindex_localtime on; 	#按服务器时间显示，否则以gmt时间显示
		# 根据情况选择
		charset utf-8,gbk; 		#避免中文乱码
 
		location / {
         	       root  /opt/ohos_wear_market/back/logs;
                	index index.html index.htm;
       		 }

	}



	##
	# Basic Settings
	##

	sendfile on;
	tcp_nopush on;
	tcp_nodelay on;
	keepalive_timeout 65;
	types_hash_max_size 2048;
	# server_tokens off;

	# server_names_hash_bucket_size 64;
	# server_name_in_redirect off;

	include /etc/nginx/mime.types;
	default_type application/octet-stream;

	##
	# SSL Settings
	##

	ssl_protocols TLSv1 TLSv1.1 TLSv1.2 TLSv1.3; # Dropping SSLv3, ref: POODLE
	ssl_prefer_server_ciphers on;

	##
	# Logging Settings
	##

	access_log /var/log/nginx/access.log;
	error_log /var/log/nginx/error.log;

	##
	# Gzip Settings
	##

	gzip on;

	# gzip_vary on;
	# gzip_proxied any;
	# gzip_comp_level 6;
	# gzip_buffers 16 8k;
	# gzip_http_version 1.1;
	# gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

	##
	# Virtual Host Configs
	##

	include /etc/nginx/conf.d/*.conf;
	include /etc/nginx/sites-enabled/*;
}



