user www-data;
worker_processes auto;
pid /run/nginx.pid;
include /etc/nginx/modules-enabled/*.conf;

events {
	worker_connections 768;
	# multi_accept on;
}

http {

	log_format main '$remote_addr - $remote_user [$time_local] "$request" '
			'$status $body_bytes_sent "$http_referer" '
			'"$http_user_agent" "$http_x_forwarded_for"';

	server {
		listen 800;
		server_name 183.233.197.205;
		charset utf-8;
	location / {
		root /var/www/html;
		try_files $uri $uri/ /index.html;
		index index.html index.htm;
		}		
	location /api/ {
		proxy_set_header Host $http_host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header REMOTE-HOST $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_pass http://127.0.0.1:80/;
		}
	}



	 server {
                         listen       8096;
                        server_name  183.233.197.205;
                        charset utf-8;

                        location / {
                                root   /www/watch_test/h5/dist;
                                try_files $uri $uri/ /index.html;
                        }

                        location /api/ {
                                proxy_set_header Host $http_host;
                                proxy_set_header X-Real-IP $remote_addr;
                                proxy_set_header REMOTE-HOST $remote_addr;
                                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                                proxy_pass http://183.233.197.205:8092/;
                        }

                        location /watch {
                                alias /www/watch_test/h5/dist;
                                try_files $uri $uri/ /watch/index.html;
                        }

                        error_page   500 502 503 504  /50x.html;
                        location = /50x.html {
                                root   html;
                        }
        }




	server {
                         listen       8097;
                        server_name  183.233.197.205;
                        charset utf-8;

                        location / {
                                root   /www/watch_test/ums/dist;
                                try_files $uri $uri/ /index.html;
                                index  index.html index.htm;
                        }

			location /test/ums {
				alias /www/watch_test/ums/dist;
				try_files $uri $uri/ /index.html;
			}

                        location /api/ {
                                proxy_set_header Host $http_host;
                                proxy_set_header X-Real-IP $remote_addr;
                                proxy_set_header REMOTE-HOST $remote_addr;
                                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                                proxy_pass http://183.233.197.205:8092/;
                        }

                        error_page   500 502 503 504  /50x.html;
                        location = /50x.html {
                                root   html;
                        }
        }

        server {
                listen       8098;
                server_name  localhost;
                autoindex on;            #自动显示目录
                autoindex_exact_size off;       #人性化方式显示文件大小否则以byte显示
                autoindex_localtime on;         #按服务器时间显示，否则以gmt时间显示
                # 根据情况选择
                charset utf-8,gbk;              #避免中文乱码

                location / {
                       root  /opt/watch_test/lib/logs;
                        index index.html index.htm;
                 }

        }

        server {
                         listen       8099;
                        server_name  183.233.197.205;
                        charset utf-8;

                        location / {
                                root   /www/watch_test/portal/dist;
                                try_files $uri $uri/ /index.html;
                                index  index.html index.htm;
                        }

                        error_page   500 502 503 504  /50x.html;
                        location = /50x.html {
                                root   html;
                        }
        }



	##
	# Basic Settings
	##

	## listen 80;
	sendfile on;
	tcp_nopush on;
	types_hash_max_size 2048;
	# server_tokens off;

	# server_names_hash_bucket_size 64;
	# server_name_in_redirect off;

	include /etc/nginx/mime.types;
	default_type application/octet-stream;

	##
	# SSL Settings
	##

	ssl_protocols TLSv1 TLSv1.1 TLSv1.2 TLSv1.3; # Dropping SSLv3, ref: POODLE
	ssl_prefer_server_ciphers on;

	##
	# Logging Settings
	##

	access_log /var/log/nginx/access.log;
	error_log /var/log/nginx/error.log;

	##
	# Gzip Settings
	##

	gzip on;

	# gzip_vary on;
	# gzip_proxied any;
	# gzip_comp_level 6;
	# gzip_buffers 16 8k;
	# gzip_http_version 1.1;
	# gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

	##
	# Virtual Host Configs
	##

	include /etc/nginx/conf.d/*.conf;
	include /etc/nginx/sites-enabled/*;
}


